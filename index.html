<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tim Crean</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0a0a;
      --text: #eaeaea;
      --muted: #888;
      --accent: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px;
    }

    section {
      padding: 120px 0;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
    }

    h1 {
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 600;
      margin: 0;
      letter-spacing: -2px;
    }

    .subtitle {
      margin-top: 10px;
      color: var(--muted);
      font-size: 1.2rem;
    }

    /* LINKS */
    a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      transition: all 0.3s ease;
    }

    a:hover {
      opacity: 0.6;
      border-bottom: 1px solid white;
    }

    /* PROJECTS */
    .project {
      margin-bottom: 60px;
      cursor: pointer;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .project:hover {
      transform: translateY(-4px);
      opacity: 0.8;
    }

    .project-title {
      font-size: 1.5rem;
      margin-bottom: 5px;
    }

    .project-meta {
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ABOUT */
    .about {
      font-size: 1.1rem;
      color: var(--muted);
      max-width: 600px;
    }

    /* FOOTER */
    footer {
      padding: 80px 0;
      font-size: 0.9rem;
      color: var(--muted);
    }

    /* FADE-IN ANIMATION */
    .fade {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s ease;
    }

    .fade.visible {
      opacity: 1;
      transform: translateY(0);
    }

  </style>
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <div class="container">
      <h1>Tim Crean</h1>
      <div class="subtitle">Producer, Engineer, Musician</div>
    </div>
  </section>

  <!-- MUSIC -->
  <section>
    <div class="container fade">
      <iframe style="border-radius:12px"
        src="https://open.spotify.com/embed/artist/INSERT_ID"
        width="100%" height="152" frameBorder="0"></iframe>
    </div>
  </section>

  <!-- WORK -->
  <section>
    <div class="container fade">
      <div class="project">
        <div class="project-title">Wake Up</div>
        <div class="project-meta">2026 — Single</div>
      </div>

      <div class="project">
        <div class="project-title">Untitled Demo</div>
        <div class="project-meta">2025</div>
      </div>
    </div>
  </section>

  <!-- ABOUT -->
  <section>
    <div class="container fade">
      <p class="about">
        Tim Crean is a producer, engineer, and musician exploring space,
        memory, and distortion. Built on atmosphere and restraint,
        each track focuses on tone as much as melody.
      </p>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="container fade">
      <p>
        <a href="mailto:your@email.com">Email</a> —
        <a href="#">Instagram</a> —
        <a href="#">Spotify</a>
      </p>
    </div>
  </footer>

  <!-- FADE-IN SCRIPT -->
  <script>
    const faders = document.querySelectorAll('.fade');

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    });

    faders.forEach(el => observer.observe(el));
  </script>

</body>
</html>
