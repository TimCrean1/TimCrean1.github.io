<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — Tim Crean</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #daf2ec;
      --surface: #ffffff12;
      --text: #0b0f0e;
      --this: #000000;
      --muted: #2f3b38;
      --accent: #2b6f63;
      --border: rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #d8f6ee 0%, var(--bg) 60%);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .flow > * {
      margin-top: 60px;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      margin: 0;
    }

    h2 {
      font-size: 1.6rem;
      color: var(--muted);
    }

    a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: 0.2s;
    }

    a:hover {
      opacity: 0.7;
      border-bottom: 1px solid var(--accent);
    }

    .contact-block {
      font-size: 1.1rem;
      line-height: 1.8;
    }
  </style>
</head>
<body>

  <!-- shared header -->
  <div id="header"></div>

  <div class="container flow">

    <h1>Contact</h1>

    <div class="contact-block">
      <p>
        If you’re interested in working together, collaborating, or just reaching out, feel free to contact me.
      </p>

      <p>
        <strong>Email</strong><br>
        <a href="mailto:tim.c.crean@gmail.com">tim.c.crean@gmail.com</a>
      </p>

      <p>
        <strong>Instagram</strong><br>
        <a href="https://www.instagram.com/darbus__/" target="_blank">@darbus__</a>
      </p>

      <p>
        <strong>Spotify</strong><br>
        <a href="#" target="_blank">Coming soon</a>
      </p>
    </div>

  </div>

  <!-- shared footer -->
  <div id="footer"></div>

  <script>
    async function loadComponent(id, file) {
      const res = await fetch(file);
      const html = await res.text();
      document.getElementById(id).innerHTML = html;
    }

    async function init() {
      await loadComponent("header", "components/header.html");
      await loadComponent("footer", "components/footer.html");
    }

    init();
  </script>

</body>
</html>
